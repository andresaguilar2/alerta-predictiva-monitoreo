spring:
  application:
    name: edge-detector

server:
  port: 8081

app:
  detection:
    confidence-threshold: 0.65
    cooldown-seconds: 20
  onnx:
    enabled: true
    model-path: models/yolov8n.onnx
    input-width: 640
    input-height: 640
    person-class-index: 0
  notifier:
    base-url: http://localhost:8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
